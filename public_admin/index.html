<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN - Lobo Store</title>
    <style>
        :root { --cyan: #00F2FF; --purple: #BC13FE; --bg: #050505; --card: #121212; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--card); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; background: #222; border-radius: 10px; font-weight: bold; }
        .tab.active { background: var(--purple); box-shadow: 0 0 15px var(--purple); }
        .form-section { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-bottom: 30px; border-left: 4px solid var(--cyan); }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-edit { background: var(--cyan); color: black; }
        .btn-delete { background: #FF3B30; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--cyan); padding: 10px; font-size: 0.8rem; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <div class="tab active" id="tab-p" onclick="showTab('p')">PRODUCTOS</div>
        <div class="tab" id="tab-u" onclick="showTab('u')">USUARIOS 👥</div>
        <div class="tab" id="tab-c" onclick="showTab('c')">BOT CONFIG ⚙️</div>
    </div>

    <!-- PRODUCTOS -->
    <div id="sec-p">
        <div class="form-section">
            <h3 id="p-title">NUEVO PRODUCTO</h3>
            <input type="hidden" id="p-id">
            <input type="text" id="p-name" placeholder="Nombre">
            <input type="number" id="p-price" placeholder="Precio">
            <button class="btn btn-edit" onclick="saveProduct()">GUARDAR</button>
        </div>
        <table id="p-table"><thead><tr><th>Nombre</th><th>Acción</th></tr></thead><tbody id="p-list"></tbody></table>
    </div>

    <!-- USUARIOS -->
    <div id="sec-u" class="hidden">
        <div class="form-section">
            <h3 id="u-title">EDITAR DATOS DE CLIENTE</h3>
            <input type="hidden" id="u-key">
            <input type="text" id="u-name" placeholder="Nombre Personalizado">
            <input type="number" id="u-phone" placeholder="Número de Contacto">
            <button class="btn btn-edit" onclick="saveUser()">ACTUALIZAR DATOS</button>
            <button class="btn btn-delete" onclick="resetUserForm()">CANCELAR</button>
        </div>
        <table><thead><tr><th>Cliente</th><th>Número</th><th>WhatsApp</th><th>Acción</th></tr></thead><tbody id="u-list"></tbody></table>
    </div>

    <!-- BOT CONFIG -->
    <div id="sec-c" class="hidden" style="text-align:center">
        <button class="btn btn-delete" style="padding:20px; width:100%" onclick="resetBot()">🔥 RESETEAR SESIÓN BOT</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { databaseURL: "https://producto-enventa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let products = {}; let users = {};

    function showTab(t) {
        ['p','u','c'].forEach(s => { document.getElementById('sec-'+s).classList.add('hidden'); document.getElementById('tab-'+s).classList.remove('active'); });
        document.getElementById('sec-'+t).classList.remove('hidden'); document.getElementById('tab-'+t).classList.add('active');
    }

    db.ref("products").on("value", snap => {
        const list = document.getElementById("p-list"); list.innerHTML = "";
        snap.forEach(child => {
            const p = child.val(); products[child.key] = p;
            list.innerHTML += `<tr><td>${p.name}</td><td><button class='btn btn-edit' onclick='editP("${child.key}")'>E</button></td></tr>`;
        });
    });

    db.ref("bot_users").on("value", snap => {
        const list = document.getElementById("u-list"); list.innerHTML = "";
        users = {};
        snap.forEach(child => {
            const u = child.val(); users[child.key] = u;
            list.innerHTML += `<tr>
                <td><strong>${u.name || u.whatsapp_name || 'Nuevo'}</strong></td>
                <td>${u.number || '-'}</td>
                <td>${child.key}</td>
                <td><button class='btn btn-edit' onclick='prepareUser("${child.key}")'>EDITAR</button></td>
            </tr>`;
        });
    });

    function prepareUser(key) {
        const u = users[key];
        document.getElementById("u-key").value = key;
        document.getElementById("u-name").value = u.name || u.whatsapp_name || "";
        document.getElementById("u-phone").value = u.number || "";
        document.getElementById("u-title").innerText = "EDITANDO CLIENTE: " + key;
    }

    async function saveUser() {
        const key = document.getElementById("u-key").value;
        if(!key) return alert("Selecciona un usuario");
        await db.ref("bot_users/" + key).update({
            name: document.getElementById("u-name").value,
            number: document.getElementById("u-phone").value,
            phone: document.getElementById("u-phone").value
        });
        alert("Datos sincronizados con el bot.");
        resetUserForm();
    }

    function resetUserForm() { document.getElementById("u-key").value = ""; document.getElementById("u-name").value = ""; document.getElementById("u-phone").value = ""; }
    async function resetBot() { if(confirm("¿RESET?")) await db.ref("bot_control/command").set({action:"LOGOUT", timestamp:Date.now()}); }
    function editP(id) { /* similar logic */ }
    async function saveProduct() { /* similar logic */ }
</script>
</body>
</html>

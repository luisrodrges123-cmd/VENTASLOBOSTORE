<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CATÁLOGO - Ventas Lobo Store</title>
    <style>
        :root {
            --neon-cyan: #00F2FF;
            --neon-purple: #BC13FE;
            --bg-black: #050505;
            --dark-card: #121212;
            --text-high: #E0E0E0;
            --text-med: #9E9E9E;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-high);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .navbar {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
        }

        .navbar img {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            border-radius: 50%;
            border: 1px solid var(--neon-cyan);
        }

        .navbar h1 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--neon-cyan);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, #0a0a0a, var(--bg-black));
        }

        .hero h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--neon-cyan), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .product-card {
            background: var(--dark-card);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.1);
            border-color: var(--neon-cyan);
        }

        .product-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .product-info {
            padding: 20px;
        }

        .product-name {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            margin: 0 0 10px 0;
        }

        .product-price {
            font-size: 1.5rem;
            color: var(--neon-cyan);
            font-weight: 900;
            margin-bottom: 15px;
        }

        .product-desc {
            font-size: 0.9rem;
            color: var(--text-med);
            line-height: 1.4;
            margin-bottom: 20px;
            height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
        }

        .btn-buy {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #25D366, #128C7E);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn-buy:hover {
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
            transform: scale(1.02);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: var(--dark-card);
            margin: 10% auto;
            padding: 30px;
            border: 1px solid var(--neon-cyan);
            width: 90%;
            max-width: 400px;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        .modal-header {
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-med); font-size: 0.9rem; }
        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-confirm {
            width: 100%;
            padding: 12px;
            background: var(--neon-cyan);
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .loader {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--neon-cyan);
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--text-med);
            font-size: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 50px;
        }
    </style>
</head>
<body>

<div class="navbar">
    <img src="https://storage.googleapis.com/static.smart-chat.ai/v1/user-images/f77b9468-d064-4e35-a1c6-29177114b01d/20250212004652_3.jpg" alt="Logo">
    <h1>VENTAS LOBO STORE</h1>
</div>

<div class="hero">
    <h2>Nuestros Productos</h2>
    <p>Calidad Premium al alcance de tu mano</p>
</div>

<div class="container">
    <div id="loader" class="loader">Cargando catálogo...</div>
    <div id="product-grid" class="product-grid"></div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 class="modal-header">Confirmar Pedido</h3>
        <input type="hidden" id="selectedProductName">
        <input type="hidden" id="selectedProductPrice">
        <input type="hidden" id="selectedProductImg">

        <div class="form-group">
            <label for="custName">Tu Nombre</label>
            <input type="text" id="custName" placeholder="Ej. Juan Pérez">
        </div>
        <div class="form-group">
            <label for="custPhone">Tu Teléfono</label>
            <input type="tel" id="custPhone" placeholder="Ej. 6681234567">
        </div>
        <button class="btn-confirm" onclick="finalizeOrder()">Finalizar por WhatsApp</button>
        <button class="btn-buy" style="background: transparent; border: 1px solid #333; margin-top: 10px;" onclick="closeModal()">Cancelar</button>
    </div>
</div>

<footer>
    &copy; 2024 VENTAS LOBO STORE - Todos los derechos reservados
</footer>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-7VpETFI6SxNNVEDhrXRnkU1nQjFBV9g",
        databaseURL: "https://producto-enventa-default-rtdb.firebaseio.com",
        projectId: "producto-enventa",
        storageBucket: "producto-enventa.firebasestorage.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const WHATSAPP_NUMBER = "5216681431491";

    function loadProducts() {
        const grid = document.getElementById("product-grid");
        const loader = document.getElementById("loader");
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        if (productId) {
            db.ref("products/" + productId).on("value", (snapshot) => {
                grid.innerHTML = "";
                loader.style.display = "none";
                if (!snapshot.exists()) {
                    grid.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Producto no encontrado.</p>";
                    return;
                }
                renderProduct(snapshot.val(), grid);
            });
        } else {
            db.ref("products").on("value", (snapshot) => {
                grid.innerHTML = "";
                loader.style.display = "none";
                if (!snapshot.exists()) return;
                snapshot.forEach((child) => renderProduct(child.val(), grid));
            });
        }
    }

    function renderProduct(p, container) {
        const productCard = document.createElement("div");
        productCard.className = "product-card";
        const imgUrl = p.imageUrl || "https://via.placeholder.com/300x250?text=Sin+Imagen";
        productCard.innerHTML = `
            <img src="${imgUrl}" alt="${p.name}" class="product-image">
            <div class="product-info">
                <h3 class="product-name">${p.name}</h3>
                <div class="product-price">$${p.price}</div>
                <p class="product-desc">${p.description || 'Sin descripción.'}</p>
                <button class="btn-buy" onclick="openOrderModal('${p.name}', ${p.price}, '${imgUrl}')">ORDENAR AHORA</button>
            </div>
        `;
        container.appendChild(productCard);
    }

    function openOrderModal(name, price, img) {
        document.getElementById("selectedProductName").value = name;
        document.getElementById("selectedProductPrice").value = price;
        document.getElementById("selectedProductImg").value = img;
        document.getElementById("orderModal").style.display = "block";
    }

    function closeModal() { document.getElementById("orderModal").style.display = "none"; }

    async function finalizeOrder() {
        const name = document.getElementById("custName").value;
        const phone = document.getElementById("custPhone").value;
        if (!name || !phone) return alert("Ingresa tus datos");

        const order = {
            username: name,
            phone: phone,
            productName: document.getElementById("selectedProductName").value,
            price: parseFloat(document.getElementById("selectedProductPrice").value),
            imageUrl: document.getElementById("selectedProductImg").value,
            status: "PENDIENTE",
            timestamp: Date.now()
        };

        await db.ref("orders").push(order);
        const message = `🐺 *NUEVO PEDIDO*\n\n*Cliente:* ${name}\n*Producto:* ${order.productName}\n*Precio:* $${order.price}`;
        window.open(`https://api.whatsapp.com/send?phone=${WHATSAPP_NUMBER}&text=${encodeURIComponent(message)}`, '_blank');
        closeModal();
    }

    loadProducts();
</script>
</body>
</html>

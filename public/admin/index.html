<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - Ventas Lobo Store</title>
    <style>
        :root {
            --neon-cyan: #00F2FF;
            --neon-purple: #BC13FE;
            --bg-black: #050505;
            --dark-card: #121212;
            --text-high: #E0E0E0;
            --text-med: #9E9E9E;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-black);
            color: var(--text-high);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: var(--dark-card);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,242,255,0.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 60px;
            height: 60px;
            margin-right: 15px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
        }

        h1 {
            margin: 0;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .tabs { display: flex; border-bottom: 2px solid #222; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; color: var(--text-med); }
        .tab.active { color: var(--neon-purple); border-bottom: 3px solid var(--neon-purple); }

        .form-section { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; margin-bottom: 30px; border-left: 4px solid var(--neon-cyan); }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; }

        .btn { padding: 12px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .btn-add { background-color: var(--neon-cyan); color: black; width: 100%; }
        .btn-edit { background-color: var(--neon-purple); color: white; padding: 5px 10px; margin-right: 5px; }
        .btn-delete { background-color: #FF3B30; color: white; padding: 5px 10px; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; }
        th { color: var(--neon-cyan); font-size: 12px; }

        .status-chip { padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid var(--neon-purple); color: var(--neon-purple); }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="https://storage.googleapis.com/static.smart-chat.ai/v1/user-images/f77b9468-d064-4e35-a1c6-29177114b01d/20250212004652_3.jpg" alt="logo" class="logo">
        <h1>ADMIN PANEL PREMIUM</h1>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-products" onclick="showTab('products')">INVENTARIO</div>
        <div class="tab" id="tab-orders" onclick="showTab('orders')">PEDIDOS</div>
        <div class="tab" onclick="window.open('../', '_blank')">VER TIENDA 🌐</div>
    </div>

    <div id="section-products">
        <div class="form-section">
            <h3 id="form-title">NUEVO PRODUCTO</h3>
            <input type="hidden" id="edit-id">
            <div class="form-group"><input type="text" id="name" placeholder="Nombre del Producto"></div>
            <div class="form-group"><input type="number" id="price" placeholder="Precio"></div>
            <div class="form-group"><textarea id="description" placeholder="Descripción"></textarea></div>
            <div class="form-group"><input type="text" id="imageUrl" placeholder="URL Imagen"></div>
            <button class="btn btn-add" id="btn-save" onclick="saveProduct()">GUARDAR PRODUCTO</button>
            <button class="btn btn-delete hidden" id="btn-cancel" onclick="resetForm()" style="margin-top:10px; width:100%">CANCELAR</button>
        </div>

        <table>
            <thead><tr><th>Producto</th><th>Precio</th><th>Acciones</th></tr></thead>
            <tbody id="product-list"></tbody>
        </table>
    </div>

    <div id="section-orders" class="hidden">
        <table>
            <thead><tr><th>Cliente</th><th>Producto</th><th>Estado</th><th>Acción</th></tr></thead>
            <tbody id="order-list"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB-7VpETFI6SxNNVEDhrXRnkU1nQjFBV9g",
        databaseURL: "https://producto-enventa-default-rtdb.firebaseio.com",
        projectId: "producto-enventa",
        storageBucket: "producto-enventa.firebasestorage.app",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(type) {
        document.getElementById('section-products').classList.toggle('hidden', type !== 'products');
        document.getElementById('section-orders').classList.toggle('hidden', type !== 'orders');
        document.getElementById('tab-products').classList.toggle('active', type === 'products');
        document.getElementById('tab-orders').classList.toggle('active', type === 'orders');
        if (type === 'orders') loadOrders();
    }

    function loadProducts() {
        db.ref("products").on("value", (snapshot) => {
            const list = document.getElementById("product-list");
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const p = child.val();
                list.innerHTML += `<tr>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td>
                        <button class="btn btn-edit" onclick="editProduct('${child.key}', '${p.name}', ${p.price}, '${p.description || ''}', '${p.imageUrl || ''}')">Edit</button>
                        <button class="btn btn-delete" onclick="deleteItem('products/${child.key}')">X</button>
                    </td>
                </tr>`;
            });
        });
    }

    function loadOrders() {
        db.ref("orders").on("value", (snapshot) => {
            const list = document.getElementById("order-list");
            list.innerHTML = "";
            snapshot.forEach((child) => {
                const o = child.val();
                list.innerHTML += `<tr>
                    <td>${o.username}</td>
                    <td>${o.productName}</td>
                    <td><span class="status-chip">${o.status}</span></td>
                    <td><button class="btn btn-delete" onclick="deleteItem('orders/${child.key}')">X</button></td>
                </tr>`;
            });
        });
    }

    async function saveProduct() {
        const id = document.getElementById("edit-id").value;
        const data = {
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            description: document.getElementById("description").value,
            imageUrl: document.getElementById("imageUrl").value
        };
        if (!data.name || isNaN(data.price)) return alert("Datos incompletos");

        if (id) await db.ref("products/" + id).update(data);
        else await db.ref("products").push(data);
        alert("¡Guardado correctamente!");
        resetForm();
    }

    function editProduct(id, name, price, desc, img) {
        document.getElementById("edit-id").value = id;
        document.getElementById("name").value = name;
        document.getElementById("price").value = price;
        document.getElementById("description").value = desc;
        document.getElementById("imageUrl").value = img;
        document.getElementById("form-title").innerText = "EDITANDO PRODUCTO";
        document.getElementById("btn-cancel").classList.remove("hidden");
    }

    function resetForm() {
        document.getElementById("edit-id").value = "";
        document.getElementById("name").value = "";
        document.getElementById("price").value = "";
        document.getElementById("description").value = "";
        document.getElementById("imageUrl").value = "";
        document.getElementById("form-title").innerText = "NUEVO PRODUCTO";
        document.getElementById("btn-cancel").classList.add("hidden");
    }

    async function deleteItem(path) { if(confirm("¿Eliminar?")) await db.ref(path).remove(); }

    loadProducts();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PREMIUM - Ventas Lobo Store</title>
    <style>
        :root {
            --neon-cyan: #00F2FF;
            --neon-purple: #BC13FE;
            --bg-black: #050505;
            --dark-card: #121212;
            --text-high: #E0E0E0;
            --text-med: #9E9E9E;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-high);
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: var(--dark-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0,242,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            transition: 0.5s;
        }

        h1 {
            margin: 0;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-med);
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            min-width: 120px;
        }

        .tab.active {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        .form-section {
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 0.95rem;
        }

        input:focus, textarea:focus {
            border-color: var(--neon-cyan);
            outline: none;
        }

        .btn-container { display: flex; gap: 10px; }
        .btn { padding: 14px 25px; cursor: pointer; border: none; border-radius: 10px; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 0.9rem; }
        .btn-save { background: var(--neon-cyan); color: black; flex: 2; }
        .btn-cancel { background: #333; color: white; flex: 1; }
        .btn-danger { background: linear-gradient(45deg, #FF3B30, #990000); color: white; width: 100%; padding: 20px; font-size: 1rem; border-radius: 15px; border:none; cursor:pointer; font-weight: 900; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 15px; text-align: left; color: var(--neon-cyan); font-size: 0.75rem; text-transform: uppercase; }
        td { padding: 15px; background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr td:first-child { border-radius: 12px 0 0 12px; }
        tr td:last-child { border-radius: 0 12px 12px 0; }

        .action-btn { padding: 8px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-right: 5px; text-decoration: none; }
        .btn-edit { background: var(--neon-purple); color: white; }
        .btn-delete { background: #FF3B30; color: white; }
        .btn-wa { background: #25D366; color: white; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="https://postimg.cc/JyW9Jt8R" target="_blank">
            <img src="https://i.postimg.cc/VNS1xbH0/logo-lobo.png" alt="Logo" class="logo">
        </a>
        <h1>MODO SISTEMA PREMIUM</h1>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-p" onclick="showTab('p')">PRODUCTOS</div>
        <div class="tab" id="tab-o" onclick="showTab('o')">PEDIDOS</div>
        <div class="tab" id="tab-m" onclick="showTab('m')">MENSAJES 💬</div>
        <div class="tab" id="tab-u" onclick="showTab('u')">USUARIOS 👥</div>
        <div class="tab" id="tab-c" onclick="showTab('c')">BOT CONFIG ⚙️</div>
        <div class="tab" onclick="window.open('https://producto-enventa-63d4e.firebaseapp.com/', '_blank')">TIENDA 🌐</div>
    </div>

    <!-- SECCIÓN PRODUCTOS -->
    <div id="sec-p">
        <div class="form-section">
            <h3 id="p-form-title" style="color:var(--neon-cyan)">GESTIÓN DE INVENTARIO</h3>
            <input type="hidden" id="p-id">
            <div class="grid-inputs">
                <input type="text" id="p-name" placeholder="Nombre del Producto">
                <input type="number" id="p-price" placeholder="Precio ($)">
                <input type="text" id="p-category" placeholder="Categoría">
                <input type="number" id="p-stock" placeholder="Stock">
                <input type="text" id="p-img" placeholder="Enlace de Imagen">
                <textarea id="p-desc" placeholder="Descripción detallada..." style="grid-column: span 2; height: 100px;"></textarea>
            </div>
            <div class="btn-container">
                <button class="btn btn-save" onclick="saveProduct()">GUARDAR PRODUCTO</button>
                <button class="btn btn-cancel hidden" id="p-btn-cancel" onclick="resetProductForm()">CANCELAR</button>
            </div>
        </div>
        <table>
            <thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead>
            <tbody id="p-list-body"></tbody>
        </table>
    </div>

    <!-- SECCIÓN USUARIOS -->
    <div id="sec-u" class="hidden">
        <div class="form-section">
            <h3 id="u-form-title" style="color:var(--neon-cyan)">EDITAR CLIENTE</h3>
            <input type="hidden" id="u-key">
            <input type="hidden" id="u-old-number">
            <div class="grid-inputs">
                <input type="text" id="u-name" placeholder="Nombre del Cliente">
                <input type="number" id="u-phone" placeholder="Número de Teléfono (Contacto)">
            </div>
            <div class="btn-container">
                <button class="btn btn-save" onclick="saveUser()">ACTUALIZAR DATOS</button>
                <button class="btn btn-cancel" onclick="resetUserForm()">LIMPIAR</button>
            </div>
        </div>
        <table>
            <thead><tr><th>Nombre</th><th>Número</th><th>Acción</th></tr></thead>
            <tbody id="u-list-body"></tbody>
        </table>
    </div>

    <!-- SECCIÓN PEDIDOS -->
    <div id="sec-o" class="hidden">
        <table>
            <thead><tr><th>Cliente</th><th>WhatsApp</th><th>Producto</th><th>Acción</th></tr></thead>
            <tbody id="o-list-body"></tbody>
        </table>
    </div>

    <!-- SECCIÓN MENSAJES -->
    <div id="sec-m" class="hidden">
        <table>
            <thead><tr><th>Fecha</th><th>Usuario</th><th>Datos Recibidos</th><th>Acción</th></tr></thead>
            <tbody id="m-list-body"></tbody>
        </table>
    </div>

    <!-- SECCIÓN BOT CONFIG -->
    <div id="sec-c" class="hidden" style="text-align:center">
        <div class="form-section">
            <h2 style="color:#FF3B30">ZONA DE SEGURIDAD</h2>
            <button class="btn-danger" onclick="resetBotSession()">🔥 CERRAR SESIÓN DEL BOT (LOGOUT)</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://producto-enventa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let productsData = {};
    let usersData = {};

    function showTab(t) {
        ['p','o','m','u','c'].forEach(s => {
            document.getElementById('sec-'+s).classList.add('hidden');
            document.getElementById('tab-'+s).classList.remove('active');
        });
        document.getElementById('sec-'+t).classList.remove('hidden');
        document.getElementById('tab-'+t).classList.add('active');
    }

    // --- PRODUCTOS ---
    db.ref("products").on("value", (snap) => {
        const list = document.getElementById("p-list-body"); list.innerHTML = "";
        productsData = {};
        snap.forEach((child) => {
            const p = child.val(); productsData[child.key] = p;
            list.innerHTML += `<tr><td><strong>${p.name}</strong></td><td>$${p.price}</td><td>${p.stock || 0}</td><td>
                <button class="action-btn btn-edit" onclick="prepareProductEdit('${child.key}')">EDITAR</button>
                <button class="action-btn btn-delete" onclick="deleteItem('products/${child.key}')">X</button>
            </td></tr>`;
        });
    });

    async function saveProduct() {
        const id = document.getElementById("p-id").value;
        const data = {
            name: document.getElementById("p-name").value.trim(),
            price: parseFloat(document.getElementById("p-price").value) || 0,
            category: document.getElementById("p-category").value.trim(),
            stock: parseInt(document.getElementById("p-stock").value) || 0,
            description: document.getElementById("p-desc").value.trim(),
            imageUrl: document.getElementById("p-img").value.trim()
        };
        if(!data.name) return alert("Nombre obligatorio");
        if(id) await db.ref("products/" + id).set(data);
        else await db.ref("products").push(data);
        alert("¡Guardado!"); resetProductForm();
    }

    function prepareProductEdit(id) {
        const p = productsData[id];
        document.getElementById("p-id").value = id;
        document.getElementById("p-name").value = p.name || "";
        document.getElementById("p-price").value = p.price || 0;
        document.getElementById("p-category").value = p.category || "";
        document.getElementById("p-stock").value = p.stock || 0;
        document.getElementById("p-desc").value = p.description || "";
        document.getElementById("p-img").value = p.imageUrl || "";
        document.getElementById("p-form-title").innerText = "EDITANDO: " + p.name;
        document.getElementById("p-btn-cancel").classList.remove("hidden");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetProductForm() {
        document.getElementById("p-id").value = "";
        document.querySelectorAll('#sec-p input, #sec-p textarea').forEach(i => i.value = "");
        document.getElementById("p-form-title").innerText = "GESTIÓN DE INVENTARIO";
        document.getElementById("p-btn-cancel").classList.add("hidden");
    }

    // --- USUARIOS ---
    db.ref("bot_users").on("value", (snap) => {
        const list = document.getElementById("u-list-body"); list.innerHTML = "";
        usersData = {};
        snap.forEach((child) => {
            const u = child.val(); const key = child.key; usersData[key] = u;
            const finalNum = u.number || u.phone || key;
            const waLink = `https://wa.me/${finalNum.toString().replace(/\D/g,'')}`;
            list.innerHTML += `<tr>
                <td><strong>${u.name || u.whatsapp_name || 'Nuevo'}</strong></td>
                <td>${finalNum}</td>
                <td>
                    <button class="action-btn btn-edit" onclick="prepareUserEdit('${key}')">EDITAR</button>
                    <a href="${waLink}" class="action-btn btn-wa" target="_blank">WHATSAPP</a>
                    <button class="action-btn btn-delete" onclick="deleteItem('bot_users/${key}')">X</button>
                </td>
            </tr>`;
        });
    });

    function prepareUserEdit(key) {
        const u = usersData[key];
        document.getElementById("u-key").value = key;
        document.getElementById("u-old-number").value = u.number || u.phone || key;
        document.getElementById("u-name").value = u.name || u.whatsapp_name || "";
        document.getElementById("u-phone").value = u.number || u.phone || key;
        document.getElementById("u-form-title").innerText = "EDITANDO CLIENTE: " + (u.name || u.whatsapp_name);
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    async function saveUser() {
        const key = document.getElementById("u-key").value;
        const newName = document.getElementById("u-name").value.trim();
        const newPhone = document.getElementById("u-phone").value.trim();
        if(!key) return alert("Selecciona un usuario");
        await db.ref("bot_users/" + key).update({ name: newName, number: newPhone, phone: newPhone });
        alert("¡Cliente actualizado!"); resetUserForm();
    }

    function resetUserForm() { document.getElementById("u-key").value = ""; document.getElementById("u-name").value = ""; document.getElementById("u-phone").value = ""; document.getElementById("u-form-title").innerText = "EDITAR CLIENTE"; }

    // --- PEDIDOS Y MENSAJES ---
    db.ref("orders").on("value", snap => {
        const list = document.getElementById("o-list-body"); list.innerHTML = "";
        snap.forEach(c => { const o = c.val(); list.innerHTML += `<tr><td>${o.username}</td><td>${o.phone}</td><td>${o.productName}</td><td><button class='action-btn btn-delete' onclick='deleteItem("orders/${c.key}")'>X</button></td></tr>`; });
    });

    db.ref("talk_requests").on("value", snap => {
        const list = document.getElementById("m-list-body"); list.innerHTML = "";
        snap.forEach(c => {
            const m = c.val(); const date = new Date(m.timestamp).toLocaleString();
            list.innerHTML += `<tr><td>${date}</td><td>${m.name}</td><td>${m.numero_detectado || m.number || '-'}</td><td><button class='action-btn btn-delete' onclick='deleteItem("talk_requests/${c.key}")'>X</button></td></tr>`;
        });
    });

    async function deleteItem(path) { if(confirm("¿Eliminar?")) await db.ref(path).remove(); }
    async function resetBotSession() { if(confirm("¿DESCONECTAR BOT?")) { await db.ref("bot_control/command").set({ action: "LOGOUT", timestamp: Date.now() }); alert("Orden enviada."); } }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA PREMIUM - Ventas Lobo Store</title>
    <style>
        :root {
            --neon-cyan: #00F2FF;
            --neon-purple: #BC13FE;
            --bg-black: #050505;
            --dark-card: #121212;
            --text-high: #E0E0E0;
            --text-med: #9E9E9E;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-black);
            color: var(--text-high);
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top right, #1a1a1a, #050505);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            background: var(--dark-card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0,242,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            text-align: center;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border-radius: 20px;
            box-shadow: 0 0 30px var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            transition: 0.5s;
        }

        h1 {
            margin: 0;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 5px;
            font-size: 1.8rem;
            font-weight: 900;
        }

        .tabs {
            display: flex;
            gap: 10px;
            background: var(--glass);
            padding: 5px;
            border-radius: 12px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: var(--text-med);
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 0.85rem;
            min-width: 120px;
        }

        .tab.active {
            background: var(--neon-purple);
            color: white;
            box-shadow: 0 0 15px var(--neon-purple);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 8px;
            margin-top: 20px;
        }

        th {
            padding: 15px;
            text-align: left;
            color: var(--neon-cyan);
            font-size: 0.75rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-top: 1px solid rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .action-btn {
            padding: 8px 12px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-delete { background: #FF3B30; color: white; }
        .btn-edit { background: var(--neon-purple); color: white; }
        .btn-msg { background: #25D366; color: white; text-decoration: none; display: inline-block; }

        .status-badge {
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon-cyan);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .hidden { display: none; }

        .form-section {
            background: var(--glass);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: #0a0a0a;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="https://postimg.cc/JyW9Jt8R" target="_blank"><img src="https://i.postimg.cc/JyW9Jt8R/logo-lobo.png" alt="logo-lobo" class="logo"></a>
        <h1>CENTRO DE CONTROL LOBO STORE</h1>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-p" onclick="showTab('p')">PRODUCTOS</div>
        <div class="tab" id="tab-o" onclick="showTab('o')">PEDIDOS</div>
        <div class="tab" id="tab-m" onclick="showTab('m')">MENSAJES 💬</div>
        <div class="tab" id="tab-u" onclick="showTab('u')">USUARIOS 👥</div>
        <div class="tab" onclick="window.open('https://producto-enventa-63d4e.firebaseapp.com/', '_blank')">TIENDA 🌐</div>
    </div>

    <!-- SECCIÓN PRODUCTOS -->
    <div id="sec-p">
        <div class="form-section">
            <h3 id="form-title" style="color:var(--neon-cyan)">NUEVO PRODUCTO</h3>
            <input type="hidden" id="edit-id">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                <input type="text" id="name" placeholder="Nombre">
                <input type="number" id="price" placeholder="Precio ($)">
                <input type="text" id="category" placeholder="Categoría">
                <input type="number" id="stock" placeholder="Stock">
            </div>
            <input type="text" id="img" placeholder="URL de Imagen">
            <textarea id="desc" placeholder="Descripción detallada"></textarea>
            <button class="action-btn btn-edit" style="width:100%; padding:15px" onclick="save()">GUARDAR PRODUCTO</button>
        </div>
        <table>
            <thead><tr><th>Producto</th><th>Precio</th><th>Stock</th><th>Acción</th></tr></thead>
            <tbody id="p-list"></tbody>
        </table>
    </div>

    <!-- SECCIÓN PEDIDOS -->
    <div id="sec-o" class="hidden">
        <table>
            <thead><tr><th>Cliente</th><th>WhatsApp</th><th>Producto</th><th>Acción</th></tr></thead>
            <tbody id="o-list"></tbody>
        </table>
    </div>

    <!-- SECCIÓN MENSAJES (SOLICITUDES DE ASESOR) -->
    <div id="sec-m" class="hidden">
        <h3 style="color:var(--neon-cyan)">SOLICITUDES DE ASESORÍA</h3>
        <table>
            <thead><tr><th>Fecha</th><th>Usuario</th><th>Número</th><th>Acción</th></tr></thead>
            <tbody id="m-list"></tbody>
        </table>
    </div>

    <!-- SECCIÓN USUARIOS -->
    <div id="sec-u" class="hidden">
        <h3 style="color:var(--neon-cyan)">BASE DE DATOS DE CLIENTES</h3>
        <table>
            <thead><tr><th>Nombre WhatsApp</th><th>Número de Contacto</th><th>Acción</th></tr></thead>
            <tbody id="u-list"></tbody>
        </table>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://producto-enventa-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let productsData = {};

    function showTab(t) {
        ['p','o','m','u'].forEach(s => {
            document.getElementById('sec-'+s).classList.add('hidden');
            document.getElementById('tab-'+s).classList.remove('active');
        });
        document.getElementById('sec-'+t).classList.remove('hidden');
        document.getElementById('tab-'+t).classList.add('active');
    }

    // PRODUCTOS
    db.ref("products").on("value", (snap) => {
        const list = document.getElementById("p-list"); list.innerHTML = "";
        snap.forEach((child) => {
            const p = child.val();
            productsData[child.key] = p;
            list.innerHTML += `<tr><td>${p.name}</td><td>$${p.price}</td><td>${p.stock}</td><td>
                <button class="action-btn btn-edit" onclick="prepareEdit('${child.key}')">EDITAR</button>
                <button class="action-btn btn-delete" onclick="db.ref('products/${child.key}').remove()">X</button>
            </td></tr>`;
        });
    });

    // PEDIDOS
    db.ref("orders").on("value", (snap) => {
        const list = document.getElementById("o-list"); list.innerHTML = "";
        snap.forEach((child) => {
            const o = child.val();
            list.innerHTML += `<tr><td>${o.username}</td><td>${o.phone}</td><td>${o.productName}</td><td><button class="action-btn btn-delete" onclick="db.ref('orders/${child.key}').remove()">ELIMINAR</button></td></tr>`;
        });
    });

    // MENSAJES (Talk Requests)
    db.ref("talk_requests").on("value", (snap) => {
        const list = document.getElementById("m-list"); list.innerHTML = "";
        snap.forEach((child) => {
            const m = child.val();
            const date = new Date(m.timestamp).toLocaleString();
            list.innerHTML += `<tr><td>${date}</td><td>${m.name}</td><td>${m.number}</td><td>
                <a href="https://wa.me/${m.number.replace(/\D/g,'')}" class="action-btn btn-msg" target="_blank">HABLAR</a>
                <button class="action-btn btn-delete" onclick="db.ref('talk_requests/${child.key}').remove()">X</button>
            </td></tr>`;
        });
    });

    // USUARIOS
    db.ref("bot_users").on("value", (snap) => {
        const list = document.getElementById("u-list"); list.innerHTML = "";
        snap.forEach((child) => {
            const u = child.val();
            list.innerHTML += `<tr><td>${u.pushName || 'Anonimo'}</td><td>${u.number}</td><td>
                <a href="https://wa.me/${u.number.replace(/\D/g,'')}" class="action-btn btn-msg" target="_blank">ENVIAR WHATSAPP</a>
            </td></tr>`;
        });
    });

    async function save() {
        const id = document.getElementById("edit-id").value;
        const data = {
            name: document.getElementById("name").value,
            price: parseFloat(document.getElementById("price").value),
            category: document.getElementById("category").value,
            stock: parseInt(document.getElementById("stock").value) || 0,
            description: document.getElementById("desc").value,
            imageUrl: document.getElementById("img").value
        };
        if(id) await db.ref("products/" + id).set(data);
        else await db.ref("products").push(data);
        alert("¡Listo!");
        resetForm();
    }

    function prepareEdit(id) {
        const p = productsData[id];
        document.getElementById("edit-id").value = id;
        document.getElementById("name").value = p.name;
        document.getElementById("price").value = p.price;
        document.getElementById("category").value = p.category;
        document.getElementById("stock").value = p.stock;
        document.getElementById("desc").value = p.description;
        document.getElementById("img").value = p.imageUrl;
        window.scrollTo(0,0);
    }

    function resetForm() {
        document.getElementById("edit-id").value = "";
        document.querySelectorAll('input, textarea').forEach(i => i.value = "");
    }
</script>
</body>
</html>
